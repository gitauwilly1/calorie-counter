<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalorieTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-50 text-gray-900 font-sans">

    <div class="max-w-2xl mx-auto py-12 px-4">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold tracking-tight text-indigo-600">CalorieTracker Pro</h1>
            <p class="text-gray-500">Track your nutritional intake with precision.</p>
        </header>

        <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-8">
            <form id="calorieForm" class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <label for="foodItem" class="block text-sm font-medium text-gray-700 mb-1">Food Item</label>
                    <input type="text" id="foodItem" placeholder="e.g. Avocado Toast" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                <div class="w-full md:w-32">
                    <label for="calorieAmount" class="block text-sm font-medium text-gray-700 mb-1">Calories</label>
                    <input type="number" id="calorieAmount" placeholder="0" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                <button type="submit"
                    class="mt-6 bg-indigo-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-indigo-700 transition duration-200">
                    Add
                </button>
            </form>
        </section>

        <section class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h2 class="font-semibold text-gray-700">Daily Log</h2>
                <span class="text-sm font-medium text-gray-500">Total: <span id="totalCalories"
                        class="text-indigo-600 font-bold text-lg">0</span> kcal</span>
            </div>

            <ul id="foodList" class="divide-y divide-gray-100 min-h-[100px]">
            </ul>

            <div class="p-4 bg-gray-50 text-right">
                <button id="resetBtn"
                    class="text-sm text-red-600 hover:text-red-800 font-medium transition duration-200">
                    Clear All Records
                </button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
